---
version: 2
updates:

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: monthly
      groups:
          github-actions:
              patterns:
                  - '*'

    - package-ecosystem: uv
      directory: /
      schedule:
          interval: monthly
      versioning-strategy: lockfile-only
      groups:
          lockfile:
              patterns:
                  - '*'

    - package-ecosystem: pre-commit
      directory: /
      schedule:
          interval: monthly
      groups:
          pre-commit:
              patterns:
                  - '*'
