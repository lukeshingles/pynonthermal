---
name: Test and lint
on:
    push:
    merge_group:
    schedule:
        - cron: 0 13 * * 1
    #pull_request:
    workflow_dispatch:
    repository_dispatch:
        types: [trigger_checks]

jobs:
    lint:
        name: Format, lint, and type check
        runs-on: ubuntu-26.04-arm
        env:
            RUFF_OUTPUT_FORMAT: github
            UV_FROZEN: 1
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  activate-environment: true

            - name: Install artistools[extras]
              run: |
                  uv sync
                  uv pip install .

            - name: Run Ruff
              if: always()
              run: |
                  uv run -- ruff --version
                  uv run -- ruff check --exit-non-zero-on-fix --no-fix

            - name: Run Ruff Format
              if: always()
              run: uv run -- ruff format --check --exit-non-zero-on-format

            - name: Run pyrefly
              if: always()
              run: uv run -- pyrefly check

            - name: Run basedpyright
              if: always()
              run: uv run -- basedpyright --warnings

            - name: Run mypy
              if: always()
              run: uv run -- mypy

            - name: Run prek pre-commit checks
              uses: j178/prek-action@v2

    pytest:
        timeout-minutes: 120
        runs-on: ubuntu-26.04-arm
        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.12', '3.13', '3.14', 3.14t]
        env:
            UV_FROZEN: 1

        name: pytest python ${{ matrix.python-version }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup uv
              uses: astral-sh/setup-uv@v7
              with:
                  activate-environment: true
                  python-version: ${{ matrix.python-version }}

            - name: Install pynonthermal
              run: |
                  uv sync
                  uv pip install --compile-bytecode .

            - name: Test with pytest
              run: uv run -- python3 -m pytest --cov=./ --cov-report=xml

            - name: Report coverage
              run: uv run -- python3 -m coverage report

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v6
              env:
                  OS: ${{ runner.os.name }}
                  PYTHON: ${{ matrix.python-version }}
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage.xml
                  # directory: ./coverage/reports/
                  flags: unittests
                  env_vars: OS,PYTHON
                  name: codecov-umbrella
                  fail_ci_if_error: false
                  verbose: true
